apiVersion: apps/v1
kind: Deployment
metadata:
  name: declutr-backend
  namespace: declutr-prod
  labels:
    app: declutr-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: declutr-backend
  template:
    metadata:
      labels:
        app: declutr-backend
    spec:
      containers:
      - name: declutr-backend
        image: declutr/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: declutr-config
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: declutr-web
  namespace: declutr-prod
  labels:
    app: declutr-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: declutr-web
  template:
    metadata:
      labels:
        app: declutr-web
    spec:
      containers:
      - name: declutr-web
        image: declutr/web:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
