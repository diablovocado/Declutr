backend:
  replicaCount: 3
  image:
    repository: declutr/backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

web:
  replicaCount: 2
  image:
    repository: declutr/web
    tag: latest
  service:
    type: ClusterIP
    port: 3000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: app.declutr.io
      paths:
        - path: /
          pathType: Prefix
